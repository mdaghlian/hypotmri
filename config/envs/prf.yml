name: prf
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - contourpy   # pre-built binary; avoids C++17 compile failure on HPCs with old gcc
  - nibabel=5.3.3
  - nilearn=0.13.1
  - statsmodels
  # git packages (prfpy, dpu_mini, cvl_utils) are installed post-create by the setup script
  # using --no-build-isolation so pip sees the conda-installed packages and avoids
  # recompiling C extensions (which fails with ICC on HPC)
